<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>使用文档 - 量子隧道 </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    #sidebar {
      width: 280px;
      background: #f8f9fa;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      padding: 20px 15px;
      flex-shrink: 0;
    }
    #content {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
      line-height: 1.7;
    }
    #content img {
      max-width: 100%;
      max-height: 420px;
      height: auto;
      display: block;
      margin: 1rem auto;
    }
    #toc ol,
    #toc ul {
      list-style: none;
      padding-left: 10px;
    }
    #toc li::marker,
    #toc li::before {
      content: none !important;
    }
    .toc-active {
      font-weight: bold;
      color: #0066cc;
    }
    h1, h2, h3, h4 { margin-top: 2em; }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar navbar-light bg-white shadow-sm" style="padding: 0.5rem 1rem;">
    <a class="navbar-brand fw-bold" href="index.html">
      <i class="bi bi-lightning-charge-fill text-primary"></i>
      量子隧道
    </a>
  </nav>

  <!-- 主容器 -->
  <div id="main-container">
    <!-- 左侧目录 -->
    <div id="sidebar">
      <h3>目录</h3>
      <div id="toc"></div>
    </div>

    <!-- 右侧内容 -->
    <div id="content"></div>
  </div>

  <!-- 核心库 -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tocbot@4.20.1/dist/tocbot.min.js"></script>

  <script>
    // 默认加载同目录下的 readme.md
    const mdFile = 'readme.md';

    fetch(mdFile)
      .then(response => {
        if (!response.ok) throw new Error('文件加载失败');
        return response.text();
      })
      .then(text => {
        // 渲染 Markdown 到右侧
        document.getElementById('content').innerHTML = marked.parse(text);

        // 生成左侧大纲
        tocbot.init({
          tocSelector: '#toc',
          contentSelector: '#content',
          headingSelector: 'h1, h2, h3, h4, h5',
          scrollContainer: '#content',
          scrollSmooth: true,
          scrollSmoothDuration: 280,
          headingsOffset: 30,
          activeClass: 'toc-active'
        });
      })
      .catch(err => {
        document.getElementById('content').innerHTML = `
          <h2 style="color:red;">加载失败</h2>
          <p>无法加载 <strong>${mdFile}</strong></p>
          <p>请确保以下文件存在于同一目录：</p>
          <ul>
            <li>docs.html</li>
            <li>readme.md</li>
          </ul>
        `;
      });
  </script>
</body>
</html>
